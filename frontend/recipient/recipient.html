<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipient Dashboard - BBMS</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>

<header class="topbar">
    <h1>Recipient Dashboard</h1>
    <button onclick="logout()">Logout</button>
</header>

<main class="dashboard">

    <section class="card">
        <h2>Logged-in Recipient</h2>
        <p id="userInfo"></p>
    </section>

    <section class="card">
        <h2>My Profile</h2>
        <div id="profileBox">Loading profile...</div>
    </section>

    <section class="card">
        <h2>Update My Profile</h2>
        <form id="profileForm" class="form-row">
            <input type="text" id="updateFirstName" placeholder="First name" required>
            <input type="text" id="updateLastName" placeholder="Last name" required>
            <input type="text" id="updatePhone" placeholder="Phone" required>
            <input type="text" id="updateCondition" placeholder="Medical condition">
            <button type="submit">Update Profile</button>
        </form>
    </section>

    <section class="card">
        <h2>Search Available Blood</h2>

        <div class="form-row">
            <input type="text" id="filterBloodType" placeholder="Blood type e.g. O+">
            <input type="text" id="filterLocation" placeholder="Location e.g. Beirut">
            <input type="date" id="filterDate" min="">
            <select id="filterStatus">
                <option value="">All statuses</option>
                <option value="Available">Available</option>
                <option value="Reserved">Reserved</option>
                <option value="Used">Used</option>
                <option value="Expired">Expired</option>
            </select>
            <button onclick="loadBloodInventory()">Search</button>
        </div>

        <div id="inventoryTable">Loading inventory...</div>
    </section>

    <section class="card">
        <h2>Submit Blood Request</h2>
        <form id="requestForm" class="form-row">
            <input type="number" id="requestHospitalId" placeholder="Hospital ID" required>
            <input type="text" id="requestBloodType" placeholder="Blood Type" required>
            <input type="number" id="requestQuantity" placeholder="Quantity ml" required>
            <select id="requestPriority">
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
                <option value="High">High</option>
                <option value="Critical">Critical</option>
            </select>
            <button type="submit">Submit Request</button>
        </form>
    </section>

    <section class="card">
        <h2>My Blood Requests</h2>
        <div id="requestsTable">Loading requests...</div>
    </section>

    <section class="card">
        <h2>Notifications</h2>
        <div id="notificationsBox">Loading notifications...</div>
    </section>

</main>

<script src="recipient.js"></script>
</body>
</html>
